<!-- Social/Auth Options -->

<div class="flex items-center gap-4 py-2">

<span class="text-primary/40 text-xs font-bold uppercase tracking-widest">or</span>
<div class="h-px flex-1 bg-primary/20"></div>
</div>

<label class="flex flex-col gap-2">
<span class="text-sm font-bold text-primary/80 ml-1">Email or Phone</span>
<input class="form-input w-full rounded-xl bg-white dark:bg-primary/5 border border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base" placeholder="student@jamb.com" id="email" type="text"/>
</label>

<label class="flex flex-col gap-2">
<span class="text-sm font-bold text-primary/80 ml-1">Create password</span>
<input class="form-input w-full rounded-xl bg-white dark:bg-primary/5 border border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base" placeholder="******" id="createPassword" type="password"/>
</label>

<button class="flex w-full cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold shadow-lg shadow-primary/20 mt-2" onclick="loginUser()">
<span>Kick off where you stopped</span>
